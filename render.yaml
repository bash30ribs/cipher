services:
  - type: web
    name: cipher-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.10.12
